<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoStore — AI Videos & Images</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <span class="logo-icon">📸</span>
                <span class="logo-text">Photo<strong>Store</strong></span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link" id="navVideosBtn">🎬 Videos</a>
            </div>
            <div class="nav-actions">
                <button class="nav-ai-btn" id="aiGenerateBtn">✨ AI Generate</button>
                <button class="nav-auth-btn" id="loginBtn">Login</button>
            </div>
        </div>
    </nav>

    <!-- Hero / Welcome Section -->
    <section class="hero-mini" id="heroMini">
        <div class="hero-mini-content">
            <h1>Welcome to PhotoStore ✨</h1>
            <p>Create AI images, watch videos, and explore creativity.</p>
            <div class="hero-mini-actions">
                <button class="hero-ai-btn" id="heroAiBtn">🎨 Generate Image</button>
                <button class="hero-videos-btn" id="heroVideosBtn">🎬 Watch Videos</button>
            </div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <!-- Auth Modal -->
    <div class="auth-overlay" id="authOverlay"></div>
    <div class="auth-modal" id="authModal">
        <button class="auth-close" id="authClose">✕</button>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>
        <div class="auth-content">
            <form class="auth-form" id="loginForm">
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="auth-field">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-submit">Login</button>
            </form>
            <form class="auth-form hidden" id="signupForm">
                <div class="auth-field">
                    <label>Your Name</label>
                    <input type="text" id="signupName" placeholder="What should we call you?" maxlength="30" required>
                </div>
                <button type="submit" class="auth-submit">Join PhotoStore</button>
                <p class="auth-note">No email or password needed — just pick a name!</p>
            </form>
        </div>
    </div>

    <!-- AI Image Generation Modal -->
    <div class="ai-overlay" id="aiOverlay"></div>
    <div class="ai-modal" id="aiModal">
        <button class="ai-close" id="aiClose">✕</button>
        <div class="ai-header">
            <div class="ai-header-icon">✨</div>
            <h2>Create Your Own Picture</h2>
            <p>Describe what you want to see — AI will bring it to life</p>
        </div>
        <div class="ai-content">
            <form class="ai-form" id="aiForm">
                <div class="ai-field">
                    <label>📝 Prompt</label>
                    <textarea id="aiPrompt" placeholder="A serene mountain landscape at sunset with golden light..." rows="3" maxlength="500" required></textarea>
                    <span class="ai-char-count"><span id="aiCharCount">0</span>/500</span>
                </div>
                <div class="ai-options-grid">
                    <div class="ai-field">
                        <label>🎨 Style</label>
                        <select id="aiStyle">
                            <option value="vivid">Vivid</option>
                            <option value="natural">Natural</option>
                            <option value="anime">Anime</option>
                            <option value="cinematic">Cinematic</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="sketch">Sketch</option>
                        </select>
                    </div>
                    <div class="ai-field">
                        <label>📐 Aspect</label>
                        <select id="aiAspect">
                            <option value="1024x1024">Square 1:1</option>
                            <option value="1024x768">Landscape 4:3</option>
                            <option value="768x1024">Portrait 3:4</option>
                            <option value="1280x720">Wide 16:9</option>
                            <option value="720x1280">Story 9:16</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="ai-submit" id="aiSubmitBtn">
                    <span class="ai-btn-text">✨ Generate Image</span>
                    <span class="ai-btn-loading">⏳ Generating...</span>
                </button>
            </form>
            <div class="ai-result" id="aiResult" style="display:none;">
                <div class="ai-result-image-wrapper">
                    <img id="aiGeneratedImage" src="" alt="AI Generated Image">
                </div>
                <div class="ai-result-actions">
                    <button class="ai-download-btn" id="aiDownloadBtn">⬇ Download</button>
                    <button class="ai-create-new-btn" id="aiCreateNewBtn">← Create New</button>
                </div>
            </div>
            <div class="ai-suggestions" id="aiSuggestions">
                <label>💡 Try these:</label>
                <div class="ai-suggestion-chips">
                    <button class="ai-chip" data-prompt="A magical forest with glowing mushrooms and fireflies at night, digital art">✨ Magical forest</button>
                    <button class="ai-chip" data-prompt="Portrait of a cyberpunk samurai in neon-lit Tokyo street, cinematic lighting">🎌 Cyberpunk samurai</button>
                    <button class="ai-chip" data-prompt="Futuristic city with flying cars and holographic billboards at sunset">🌆 Futuristic city</button>
                    <button class="ai-chip" data-prompt="A cute fluffy cat wearing a wizard hat casting a spell, cartoon style">🐱 Wizard cat</button>
                    <button class="ai-chip" data-prompt="Underwater city with glass domes and ancient ruins, ethereal lighting">🌊 Underwater city</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer footer-mini">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 PhotoStore — Create, Watch, Explore.</p>
            </div>
        </div>
    </footer>

    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/videos.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
